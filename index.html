<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceren ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d0d0d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.3rem;
            color: #ff4d6d;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 15px;
        }
        .highlight {
            font-weight: 600;
            color: #ff758f;
        }
        .signature {
            margin-top: 25px;
            font-size: 1.2rem;
            color: #ff4d6d;
            font-weight: bold;
        }
        /* Müzik Çalar Tasarımı */
        .audio-container {
            width: 100%;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 15px;
            border: 1px dashed rgba(255, 77, 109, 0.3);
        }
        audio {
            width: 100%;
            height: 40px;
        }
        /* Fotoğraf Galerisi Tasarımı */
        .gallery {
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .gallery-item {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .gallery-item img {
            width: 100%;
            border-radius: 10px;
            display: block;
            height: auto;
            object-fit: cover;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        /* Arka plandaki kalpler */
        .heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.4);
            font-size: 20px;
            animation: floatUp 4s linear infinite;
            bottom: -20px;
            z-index: -1;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ceren ❤️</h1>
        <p>Bu sayfayı sadece senin için hazırladım.</p>
        <p class="highlight">Seni kırdığım için gerçekten üzgünüm. Yaptığım hataların farkındayım ve bunların sorumluluğunu alıyorum.</p>
        
        <div class="audio-container">
            <p style="font-size: 0.85rem; margin-bottom: 5px; color: #ff758f;">🎵 Müziğimizi Başlat 🎵</p>
            <audio id="bg-music" controls loop></audio>
        </div>

        <div class="signature">❤️ Umut</div>
    </div>

    <div class="gallery" id="photo-gallery">
        </div>

    <script>
        // Yüklediğin dosyaları GitHub'dan otomatik çeken akıllı sistem
        const repoOwner = "4f2ffjmpn7-create";
        const repoName = "Cerenime-";

        // Sayfa açılınca dosyaları tara
        async function loadContent() {
            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`);
                const files = await response.json();
                
                const gallery = document.getElementById('photo-gallery');
                const audioPlayer = document.getElementById('bg-music');

                files.forEach(file => {
                    const name = file.name.toLowerCase();
                    // Fotoğrafları bul ve ekle
                    if (name.endsWith('.png') || name.endsWith('.jpg') || name.endsWith('.jpeg') || name.endsWith('.webp')) {
                        if (name !== 'image.png') { // Sistem görselini atla
                            const item = document.createElement('div');
                            item.classList.add('gallery-item');
                            item.innerHTML = `<img src="${file.download_url}" alt="Ceren & Umut">`;
                            gallery.appendChild(item);
                        }
                    }
                    // Müziği bul ve çalara yükle
                    if (name.endsWith('.mp3') || name.endsWith('.wav') || name.endsWith('.m4a')) {
                        audioPlayer.src = file.download_url;
                    }
                });
            } catch (error) {
                console.error("İçerik yüklenirken bir hata oluştu:", error);
            }
        }

        // Sayfa yüklendiğinde fonksiyonları çalıştır
        window.onload = () => {
            loadContent();
            setInterval(createHeart, 500);
        };

        // Kalp uçurma efekti
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 15 + 12 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
    </script>
</body>
</html>
