<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceren ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* 🌙 GENEL ARKA PLAN */
body{
font-family:'Segoe UI';
background: linear-gradient(180deg, #0d1b2a, #1b263b, #415a77);
color:white;
overflow-x:hidden;
display:flex;
justify-content:center;
padding:30px 15px;
}

/* 💜 KALPLER */
.heart{
position:fixed;
bottom:-20px;
color:#b388ff;
text-shadow:0 0 10px #b388ff,0 0 25px #7c4dff;
font-size:22px;
animation:floatUp 6s linear infinite;
opacity:1;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* ✨ YILDIZLAR */
.star{
position:fixed;
color:#d1c4ff;
text-shadow:0 0 10px #ffffff,0 0 20px #b388ff;
font-size:14px;
animation:twinkle 3s infinite;
opacity:0.9;
}

@keyframes twinkle{
50%{opacity:0.3; transform:scale(1.3);}
}

/* ========================= */
/* 💥 INTRO SCREEN (YENİ) */
/* ========================= */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#050816;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
overflow:hidden;
}

#intro h1{
color:#a78bfa;
font-size:32px;
animation:fadeIn 1.5s ease;
text-shadow:0 0 20px #7c4dff;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.8);}
to{opacity:1; transform:scale(1);}
}

/* intro kalpler */
.intro-heart{
position:absolute;
color:#b388ff;
font-size:20px;
animation:rise 3s linear forwards;
opacity:1;
}

@keyframes rise{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-200px);opacity:0;}
}

/* ========================= */
/* MAIN CONTENT */
/* ========================= */

.container{
max-width:550px;
width:100%;
text-align:center;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
}

/* BAŞLIK */
h1{
color:#a78bfa;
margin-bottom:10px;
}

/* SLIDER BAŞLIK */
.section-title{
margin:15px 0;
font-size:18px;
color:#d8b4fe;
text-shadow:0 0 10px #7c4dff;
}

/* TYPEWRITER */
.typewriter{
overflow:hidden;
white-space:nowrap;
border-right:2px solid #b388ff;
width:0;
animation:typing 4s steps(30,end) forwards, blink .8s infinite;
}

@keyframes typing{
from{width:0;}
to{width:100%;}
}

@keyframes blink{
50%{border-color:transparent;}
}

/* SLIDER */
.slider{
position:relative;
overflow:hidden;
border-radius:15px;
margin-top:10px;
}

.slides{
display:flex;
transition:transform 0.5s ease-in-out;
}

.slides img{
width:100%;
height:350px;
object-fit:cover;
flex-shrink:0;
border-radius:15px;
}

/* OKLAR */
.btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(124,77,255,0.5);
border:none;
color:white;
padding:10px;
cursor:pointer;
font-size:18px;
border-radius:8px;
}

.prev{left:10px;}
.next{right:10px;}

/* MESAJ */
.message{
margin-top:20px;
line-height:1.6;
color:#e0e0e0;
}

.signature{
margin-top:20px;
color:#a78bfa;
font-weight:bold;
}
</style>
</head>

<body>

<!-- 💥 INTRO -->
<div id="intro">
<h1>Ceren ❤️</h1>
</div>

<!-- 💜 MAIN -->
<div class="container">

<h1>Ceren ❤️</h1>

<p>Bu sayfayı sadece senin için hazırladım.</p>

<div class="section-title typewriter">
Anılarımız ve nicelerine 💜
</div>

<!-- SLIDER -->
<div class="slider">
<button class="btn prev" onclick="prev()">❮</button>

<div class="slides" id="slides">

<img src="IMG_4355.jpeg">
<img src="IMG_5516.png">
<img src="8EA530C6-B4A0-436F-AFE1-9A8E8A2EA225.png">
<img src="6ca7babd-6ae1-4cb3-90d3-aabbb54c514a.jpeg">
<img src="82646d45-29de-4fde-b956-3f883f35ceef.jpeg">

</div>

<button class="btn next" onclick="next()">❯</button>
</div>

<p class="message">
Ceren; bu mesaj...
(aynı metin burada)
</p>

<div class="signature">❤️ Umut</div>

</div>

<script>

/* 💥 INTRO KALPLER */
const intro=document.getElementById("intro");

function createIntroHeart(){
let h=document.createElement("div");
h.className="intro-heart";
h.innerHTML="💜";
h.style.left=Math.random()*100+"vw";
h.style.top=Math.random()*100+"vh";
h.style.fontSize=(15+Math.random()*20)+"px";
intro.appendChild(h);

setTimeout(()=>h.remove(),3000);
}

let introInterval=setInterval(createIntroHeart,150);

/* 3.5 saniye sonra intro kapanır */
setTimeout(()=>{
clearInterval(introInterval);
intro.style.opacity="0";
setTimeout(()=>intro.remove(),800);
},3500);


/* main kalpler + yıldızlar */
for(let i=0;i<60;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💜";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(h);
}

for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="star";
s.innerHTML="✦";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

/* slider */
let i=0;
const slides=document.getElementById("slides");
const total=slides.children.length;

function update(){
slides.style.transform=`translateX(${-i*100}%)`;
}

function next(){
i=(i+1)%total;
update();
}

function prev(){
i=(i-1+total)%total;
update();
}

</script>

</body>
</html>
